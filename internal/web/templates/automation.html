<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自动化套利配置</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #4ade80; margin-bottom: 30px; }
        .section { background: #2a2a2a; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: bold; color: #4ade80; margin-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #888; font-size: 14px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }
        .form-select { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary { background: #4ade80; color: #000; }
        .btn-primary:hover { background: #22c55e; }
        .btn-danger { background: #f43f5e; color: #fff; }
        .btn-danger:hover { background: #e11d48; }
        .btn-secondary { background: #60a5fa; color: #fff; }
        .btn-secondary:hover { background: #3b82f6; }
        .status { padding: 8px 16px; border-radius: 6px; font-size: 14px; display: inline-block; margin-left: 10px; }
        .status.running { background: #4ade80; color: #000; }
        .status.stopped { background: #f43f5e; color: #fff; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .checkbox-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-item label { cursor: pointer; font-size: 14px; }
        .endpoint-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .endpoint-table th, .endpoint-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .endpoint-table th { color: #888; font-weight: 500; }
        .endpoint-table input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #333; border-radius: 4px; background: #1a1a1a; color: #e0e0e0; font-size: 13px; }
        .endpoint-table input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .message.success { background: #4ade80; color: #000; }
        .message.error { background: #f43f5e; color: #fff; }
        .btn-large { padding: 16px 32px; font-size: 18px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 自动化套利配置</h1>

        <div id="message" class="message"></div>

        <div class="section">
            <div class="section-title">基本设置</div>
            <div class="form-group">
                <label class="form-label">启用自动化</label>
                <button id="toggleBtn" class="btn-primary btn-large">启用</button>
            </div>
            <div class="form-group">
                <label class="form-label">拉取频率</label>
                <select id="pollInterval" class="form-select">
                    <option value="10s">10秒</option>
                    <option value="30s" selected>30秒</option>
                    <option value="1m">1分钟</option>
                    <option value="5m">5分钟</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">利润阈值</label>
                <input type="number" id="profitThreshold" class="form-input" value="0.3" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label class="form-label">运行状态</label>
                <span id="status" class="status stopped">已停止</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">允许创建的交易对类型</div>
            <div class="form-label" style="margin-bottom: 10px;">只有勾选的交易对类型才会被自动创建</div>
            <div class="checkbox-group" id="traderTypes">
                <div class="checkbox-item">
                    <input type="checkbox" id="type-binance" value="binance">
                    <label for="type-binance">binance</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-gate" value="gate">
                    <label for="type-gate">gate</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-bybit" value="bybit">
                    <label for="type-bybit">bybit</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-bitget" value="bitget">
                    <label for="type-bitget">bitget</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-okex" value="okex">
                    <label for="type-okex">okex</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-hyperliquid" value="hyperliquid">
                    <label for="type-hyperliquid">hyperliquid</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-lighter" value="lighter">
                    <label for="type-lighter">lighter</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-aster" value="aster">
                    <label for="type-aster">aster</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="type-onchain" value="onchain">
                    <label for="type-onchain">onchain/chain</label>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">API端点配置</div>
            <table class="endpoint-table">
                <thead>
                    <tr>
                        <th>类型</th>
                        <th>URL</th>
                        <th>API Key</th>
                        <th>启用</th>
                    </tr>
                </thead>
                <tbody id="endpointsTable">
                </tbody>
            </table>
        </div>

        <div class="section">
            <button id="saveBtn" class="btn-primary btn-large">保存配置</button>
        </div>
    </div>

    <script>
        const defaultEndpoints = [
            { type: 'chain-chain', url: '', apiKey: '', enabled: false },
            { type: 'chain-cex:spot', url: '', apiKey: '', enabled: false },
            { type: 'chain-cex:futures', url: '', apiKey: '', enabled: false },
            { type: 'chain-dex:spot', url: '', apiKey: '', enabled: false },
            { type: 'chain-dex:futures', url: '', apiKey: '', enabled: false },
            { type: 'cex:spot-cex:spot', url: '', apiKey: '', enabled: false },
            { type: 'cex:spot-cex:futures', url: '', apiKey: '', enabled: false },
            { type: 'cex:futures-cex:spot', url: '', apiKey: '', enabled: false },
            { type: 'cex:futures-cex:futures', url: '', apiKey: '', enabled: false },
            { type: 'dex-dex', url: '', apiKey: '', enabled: false },
        ];

        let config = {
            enabled: false,
            pollInterval: '30s',
            profitThreshold: 0.3,
            allowedTraderTypes: [],
            apiEndpoints: []
        };

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/automation/config');
                if (response.ok) {
                    config = await response.json();
                    if (!config.apiEndpoints || config.apiEndpoints.length === 0) {
                        config.apiEndpoints = defaultEndpoints;
                    }
                    updateUI();
                }
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        // 更新UI
        function updateUI() {
            // 更新启用状态
            const toggleBtn = document.getElementById('toggleBtn');
            if (config.enabled) {
                toggleBtn.textContent = '禁用';
                toggleBtn.className = 'btn-danger btn-large';
            } else {
                toggleBtn.textContent = '启用';
                toggleBtn.className = 'btn-primary btn-large';
            }

            // 更新拉取频率
            document.getElementById('pollInterval').value = config.pollInterval || '30s';

            // 更新利润阈值
            document.getElementById('profitThreshold').value = config.profitThreshold || 0.3;

            // 更新交易对类型
            const checkboxes = document.querySelectorAll('#traderTypes input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = config.allowedTraderTypes && config.allowedTraderTypes.includes(cb.value);
            });

            // 更新API端点表格
            renderEndpointsTable();

            // 更新运行状态
            updateStatus();
        }

        // 渲染API端点表格
        function renderEndpointsTable() {
            const tbody = document.getElementById('endpointsTable');
            tbody.innerHTML = '';
            config.apiEndpoints.forEach((endpoint, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${endpoint.type}</td>
                    <td><input type="text" class="endpoint-url" data-index="${index}" value="${endpoint.url || ''}" placeholder="API URL"></td>
                    <td><input type="text" class="endpoint-key" data-index="${index}" value="${endpoint.apiKey || ''}" placeholder="API Key (可选)"></td>
                    <td><input type="checkbox" class="endpoint-enabled" data-index="${index}" ${endpoint.enabled ? 'checked' : ''}></td>
                `;
                tbody.appendChild(row);
            });
        }

        // 更新状态
        async function updateStatus() {
            try {
                const response = await fetch('/api/automation/status');
                if (response.ok) {
                    const status = await response.json();
                    const statusEl = document.getElementById('status');
                    if (status.running) {
                        statusEl.textContent = '运行中';
                        statusEl.className = 'status running';
                    } else {
                        statusEl.textContent = '已停止';
                        statusEl.className = 'status stopped';
                    }
                }
            } catch (error) {
                console.error('Failed to get status:', error);
            }
        }

        // 保存配置
        async function saveConfig() {
            // 收集配置
            config.enabled = document.getElementById('toggleBtn').textContent === '禁用';
            config.pollInterval = document.getElementById('pollInterval').value;
            config.profitThreshold = parseFloat(document.getElementById('profitThreshold').value);

            // 收集交易对类型
            config.allowedTraderTypes = [];
            document.querySelectorAll('#traderTypes input[type="checkbox"]:checked').forEach(cb => {
                config.allowedTraderTypes.push(cb.value);
            });

            // 收集API端点
            config.apiEndpoints.forEach((endpoint, index) => {
                const urlInput = document.querySelector(`.endpoint-url[data-index="${index}"]`);
                const keyInput = document.querySelector(`.endpoint-key[data-index="${index}"]`);
                const enabledInput = document.querySelector(`.endpoint-enabled[data-index="${index}"]`);
                if (urlInput) endpoint.url = urlInput.value;
                if (keyInput) endpoint.apiKey = keyInput.value;
                if (enabledInput) endpoint.enabled = enabledInput.checked;
            });

            try {
                const response = await fetch('/api/automation/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                if (response.ok) {
                    showMessage('配置保存成功', 'success');
                    await loadConfig();
                } else {
                    showMessage('配置保存失败: ' + await response.text(), 'error');
                }
            } catch (error) {
                showMessage('配置保存失败: ' + error.message, 'error');
            }
        }

        // 切换启用状态
        function toggleEnabled() {
            const btn = document.getElementById('toggleBtn');
            if (btn.textContent === '启用') {
                btn.textContent = '禁用';
                btn.className = 'btn-danger btn-large';
            } else {
                btn.textContent = '启用';
                btn.className = 'btn-primary btn-large';
            }
        }

        // 显示消息
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3000);
        }

        // 事件监听
        document.getElementById('toggleBtn').addEventListener('click', toggleEnabled);
        document.getElementById('saveBtn').addEventListener('click', saveConfig);

        // 初始化
        loadConfig();
        setInterval(updateStatus, 5000); // 每5秒更新一次状态
    </script>
</body>
</html>
