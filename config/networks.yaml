# 交易所充提网络配置（用于路由探测生成 pipeline）
# 格式: exchange -> asset -> chains (chainID 列表)
# 支持按资产精确配置：某币在某交易所不支持某链时，从 chains 中移除即可
# 例如：Bitget 部分币不支持 BSC(56)，则 ETH 只配 ["1","137","42161","10"]

exchanges:
  binance:
    USDT: ["1", "56", "195", "137", "42161", "10", "43114", "8453", "324", "534352"]
  bitget:
    USDT: ["1", "56", "195", "137", "42161", "10", "43114", "8453", "324", "534352"]
    # 部分币不支持 BSC 提现，按资产单独配置（无 56）
    ETH: ["1", "137", "42161", "10"]
  gate:
    USDT: ["1", "56", "195", "137", "42161", "10", "43114", "8453", "324", "534352"]
  bybit:
    USDT: ["1", "56", "195", "137", "42161", "10", "43114", "8453"]
  okex:
    USDT: ["1", "56", "195", "137", "42161", "10", "43114", "8453"]

# 跨链桥支持的链对（用于构建 chain->chain 边）
bridge_chains: ["1", "56", "137", "42161", "10", "43114", "195"]
