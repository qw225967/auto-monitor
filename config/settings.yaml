# 加密货币搬砖监控系统 - 默认配置
# 可通过环境变量覆盖

server:
  port: 8088

seeingstone:
  api_url: https://seeingstone.cloud
  api_token: ""
  request_timeout: 60  # 数据量大(3万+)时需 60s，可设 REQUEST_TIMEOUT 环境变量

threshold:
  spread: 0.5

intervals:
  fetch: 3    # 价差拉取间隔 (秒)
  detect: 30  # 全 symbol 通路探测间隔 (秒)

runner:
  detect_max_concurrency: 64 # 通路探测并发上限
  detect_route_timeout: 10    # 单路探测超时 (秒)

# 机会发现漏斗（可环境变量 FUNNEL_* 覆盖，见 internal/config/config.go）
funnel:
  price_accel_threshold: 1.0    # 层2：价格斜率加速比下限（短/长窗）
  depth_accel_threshold: 1.0    # 层3：挂单量斜率加速比下限
  volume_accel_threshold: 1.5   # 层4：挂单量「猛增」加速比下限
  anomaly_stddev_k: 2.5         # 层1：价差相对历史的 σ 倍数下限（越大越严）
  active_normal_rounds: 45      # 异常回归正常后连续多少轮才移入冷却（× fetch 间隔≈秒）
  watch_pool_not_seen_rounds: 60
  watch_pool_min_history: 5
  # 现货第一档买价名义下限（USDT = 量×价），过滤极薄盘口；0 表示不限制
  min_bid_notional_usdt: 500

token_registry:
  path: data/token_registry.json
  sync_interval: 300   # Token 信息补全间隔 (秒)，全量 symbol 增量更新
  token_refresh_ttl: 604800 # Token 信息刷新 TTL (秒)，默认 7d，过期后重新请求以补全新增链
  liquidity_sync_interval: 14400  # 流动性全表同步间隔 (秒)，默认 4h，约 500 对×6 次/天≈9 万/月
  priority_sync_enabled: true     # 启用候选优先流动性同步（高频）
  priority_sync_interval: 300     # 候选优先流动性同步间隔 (秒)
  priority_top_assets: 30         # 每轮按 spread 选取的候选资产数
  priority_max_requests: 80       # 每轮优先同步最大请求数（配额保护）
  liquidity_retry_max: 3          # 每次流动性请求最大重试次数（不含首次）
  liquidity_backoff_base_ms: 500  # 重试退避基础毫秒
  liquidity_backoff_max_ms: 5000  # 重试退避最大毫秒
  liquidity_backoff_jitter: 20    # 重试抖动百分比（±20%）
  liquidity_negative_ttl: 86400   # 负缓存 TTL (秒)，404/无池命中后默认 24h 不重复请求
  coingecko_budget_enabled: true  # 启用 CoinGecko 预算管理（日节奏 + 月上限）
  coingecko_budget_path: data/coingecko_budget.json # 预算状态持久化文件
  coingecko_monthly_limit: 100000 # 月总请求上限（Demo/Pro按实际套餐配置）
  # coingecko_api_key: ""   # CoinGecko Demo/Pro Key，避免 429
  # coingecko_pro: false    # Pro 用户设为 true

chain_price:
  interval: 3      # 链上价格拉取间隔 (秒)
  cache_ttl: 30    # 链上价格缓存时长 (秒)
  concurrency: 3   # 并发查询数

# OKEx API（用于 DEX Quote / 链上价格，建议用环境变量）
# okex:
#   app_key: ""
#   secret_key: ""
#   passphrase: ""

# 交易所 API 密钥：复制 config/exchange_keys.json.example 为 exchange_keys.json 并填写
# 格式: { "BitGet": { "APIKey": "", "Secret": "", "Passphrase": "" }, "Bybit": {...}, "Gate": {...}, ... }
# 环境变量 EXCHANGE_KEYS_PATH 可指定路径
