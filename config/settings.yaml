# 加密货币搬砖监控系统 - 默认配置
# 可通过环境变量覆盖

server:
  port: 8080

seeingstone:
  api_url: https://seeingstone.cloud
  api_token: ""
  request_timeout: 10

threshold:
  spread: 0.5

intervals:
  fetch: 3    # 价差拉取间隔 (秒)
  detect: 30  # 全 symbol 通路探测间隔 (秒)

token_registry:
  path: data/token_registry.json
  sync_interval: 300  # Token 信息补全间隔 (秒)，全量 symbol 增量更新
  # coingecko_api_key: ""   # CoinGecko Demo/Pro Key，避免 429
  # coingecko_pro: false    # Pro 用户设为 true

chain_price:
  interval: 3      # 链上价格拉取间隔 (秒)
  cache_ttl: 30    # 链上价格缓存时长 (秒)
  concurrency: 3   # 并发查询数

# OKEx API（用于 DEX Quote / 链上价格，建议用环境变量）
# okex:
#   app_key: ""
#   secret_key: ""
#   passphrase: ""
